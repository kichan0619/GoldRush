<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On-Chain Game</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0e0f13;
        overflow: hidden;
      }
      #game {
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        font: 14px/1.5 ui-monospace, monospace;
        color: #e8e8e8;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
      }
      #status {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">
      <div id="status">connecting to chain…</div>
      <div id="turn"></div>
      <div id="addr"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
